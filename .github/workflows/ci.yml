# =============================================================================
# Azure Governance Platform — CI Pipeline
# =============================================================================
# Runs on every push to main and on PRs. Lint, test, security scan.
# Does NOT build Docker images or deploy — that's handled by:
#   - deploy-staging.yml  (push to main → staging)
#   - deploy-production.yml (manual dispatch → production)
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

env:
  PYTHON_VERSION: '3.11'
  UV_VERSION: '0.5.x'

jobs:
  # ===========================================================================
  # Job 1: Lint & Test
  # ===========================================================================
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}-v2

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Unit & integration tests
        run: uv run pytest tests/unit/ tests/integration/ -q --tb=short

  # ===========================================================================
  # Job 2: Security Scan
  # ===========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-filesystem'

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit --desc --format=json --output=pip-audit-results.json || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: pip-audit-results.json

# =============================================================================
# ACR to GHCR Migration Workflow — One-time Use
# =============================================================================
# This workflow migrates existing container images from Azure Container Registry
# (ACR) to GitHub Container Registry (GHCR).
#
# Usage:
#   1. Run manually from GitHub Actions UI (workflow_dispatch)
#   2. Specify the ACR registry name (default: acrgovprod)
#   3. Images will be pulled from ACR and pushed to GHCR with same tags
#
# Prerequisites:
#   - ACR credentials stored in GitHub Secrets (ACR_USERNAME, ACR_PASSWORD)
#   - GitHub Actions has write access to packages (packages: write permission)
#
# Post-migration:
#   - Update App Service to pull from GHCR
#   - Update deployment workflows to push to GHCR
#   - Verify images work correctly in staging/production
#   - Consider deleting ACR to save costs ($5/day for Standard SKU)
# =============================================================================

name: Container Registry Migration — ACR to GHCR

on:
  workflow_dispatch:
    inputs:
      acr_registry:
        description: 'ACR registry name (without .azurecr.io)'
        required: true
        default: 'acrgovprod'
        type: string
      acr_repository:
        description: 'Repository name in ACR'
        required: true
        default: 'azure-governance-platform'
        type: string
      tags_to_migrate:
        description: 'Comma-separated list of tags to migrate (or "all" for all tags)'
        required: true
        default: 'latest,staging'
        type: string
      dry_run:
        description: 'Dry run mode (list images without migrating)'
        required: false
        default: false
        type: boolean

env:
  ACR_LOGIN_SERVER: ${{ github.event.inputs.acr_registry }}.azurecr.io
  GHCR_REGISTRY: ghcr.io
  GHCR_REPOSITORY: tygranlund/azure-governance-platform
  REPO_NAME: ${{ github.event.inputs.acr_repository }}

permissions:
  contents: read
  packages: write  # Required to push to GHCR

jobs:
  # ===========================================================================
  # Job 1: List and verify images in ACR
  # ===========================================================================
  list-images:
    name: List ACR Images
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.list-tags.outputs.tags }}
      tag_count: ${{ steps.list-tags.outputs.tag_count }}

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set subscription context
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: List repository tags in ACR
        id: list-tags
        run: |
          echo "Listing tags in ${{ env.ACR_LOGIN_SERVER }}/${{ env.REPO_NAME }}..."
          
          # Get all tags
          TAGS_JSON=$(az acr repository show-tags \
            --name ${{ github.event.inputs.acr_registry }} \
            --repository ${{ env.REPO_NAME }} \
            --orderby time_desc \
            -o json)
          
          echo "Available tags:"
          echo "$TAGS_JSON" | jq -r '.[]' | head -20
          
          TOTAL_TAGS=$(echo "$TAGS_JSON" | jq 'length')
          echo "Total tags found: $TOTAL_TAGS"
          
          # Determine which tags to migrate
          INPUT_TAGS="${{ github.event.inputs.tags_to_migrate }}"
          if [ "$INPUT_TAGS" = "all" ]; then
            MIGRATE_TAGS=$(echo "$TAGS_JSON" | jq -c '.')
            echo "Will migrate ALL tags"
          else
            # Convert comma-separated to JSON array
            MIGRATE_TAGS=$(echo "$INPUT_TAGS" | jq -R 'split(",")' | jq -c '.')
            echo "Will migrate specified tags: $INPUT_TAGS"
          fi
          
          echo "tags=${MIGRATE_TAGS}" >> $GITHUB_OUTPUT
          echo "tag_count=$(echo "$MIGRATE_TAGS" | jq 'length')" >> $GITHUB_OUTPUT

  # ===========================================================================
  # Job 2: Migrate images from ACR to GHCR
  # ===========================================================================
  migrate-images:
    name: Migrate Images
    runs-on: ubuntu-latest
    needs: list-images
    if: ${{ github.event.inputs.dry_run == 'false' }}
    strategy:
      matrix:
        tag: ${{ fromJson(needs.list-images.outputs.tags) }}
      fail-fast: false  # Continue with other tags if one fails

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        run: |
          az acr login --name ${{ github.event.inputs.acr_registry }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull from ACR and push to GHCR
        run: |
          SOURCE_IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.REPO_NAME }}:${{ matrix.tag }}"
          DEST_IMAGE="${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}:${{ matrix.tag }}"
          
          echo "Migrating: $SOURCE_IMAGE → $DEST_IMAGE"
          
          # Pull from ACR
          docker pull "$SOURCE_IMAGE"
          
          # Tag for GHCR
          docker tag "$SOURCE_IMAGE" "$DEST_IMAGE"
          
          # Push to GHCR
          docker push "$DEST_IMAGE"
          
          echo "✅ Successfully migrated: ${{ matrix.tag }}"

      # Regression guard for incident a1sb (libodbc missing in dev image
      # shipped to prod). GHCR is prod-reachable — the App Service pulls
      # from here — so EVERY tag we publish must pass the production
      # fingerprint check. This workflow is workflow_dispatch-invokable
      # against arbitrary ACR tags; without this guard, a stale dev-stage
      # image in ACR could be re-homed straight into a prod-reachable tag.
      # See .github/actions/verify-production-image/README.md
      - name: Verify production image (a1sb guard)
        uses: ./.github/actions/verify-production-image
        with:
          image-ref: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}:${{ matrix.tag }}

      - name: Verify GHCR image
        run: |
          DEST_IMAGE="${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}:${{ matrix.tag }}"
          
          # Verify the image exists in GHCR
          docker manifest inspect "$DEST_IMAGE" > /dev/null 2>&1 && \
            echo "✅ Verified: $DEST_IMAGE exists in GHCR" || \
            echo "⚠️ Warning: Could not verify $DEST_IMAGE"

  # ===========================================================================
  # Job 3: Summary
  # ===========================================================================
  summary:
    name: Migration Summary
    runs-on: ubuntu-latest
    needs: [list-images, migrate-images]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# 🐳 ACR to GHCR Migration Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Source | ${{ env.ACR_LOGIN_SERVER }}/${{ env.REPO_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Destination | ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags Found | ${{ needs.list-images.outputs.tag_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | ${{ github.event.inputs.dry_run }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Migration Status | ${{ needs.migrate-images.result || 'skipped (dry-run)' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "⚠️ **Dry run mode** — No images were actually migrated." >> $GITHUB_STEP_SUMMARY
            echo "To perform actual migration, re-run with **dry_run: false**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.migrate-images.result }}" = "success" ]; then
            echo "✅ **Migration completed successfully!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Next Steps:" >> $GITHUB_STEP_SUMMARY
            echo "1. ✅ Update deployment workflows to push to GHCR" >> $GITHUB_STEP_SUMMARY
            echo "2. ✅ Update App Service configuration to pull from GHCR" >> $GITHUB_STEP_SUMMARY
            echo "3. ✅ Test deployments in staging environment" >> $GITHUB_STEP_SUMMARY
            echo "4. ⏳ After verification, consider deleting ACR to save \`$5/day\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Migration had issues** — Check individual matrix job logs" >> $GITHUB_STEP_SUMMARY
          fi

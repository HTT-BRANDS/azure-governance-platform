# Pre-commit hooks configuration
# See https://pre-commit.com for more information

repos:
  # Ruff: Fast Python linter and formatter with import sorting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.3
    hooks:
      # Run import sorting (isort equivalent)
      - id: ruff
        name: ruff-import-sort
        args: [--select, I, --fix, --exit-non-zero-on-fix]
        stages: [pre-commit]
      # Run general linting
      - id: ruff
        name: ruff-lint
        args: [--exit-non-zero-on-fix]
        stages: [pre-commit]
      # Run formatter
      - id: ruff-format
        stages: [pre-commit]

  # detect-secrets: Scan for secrets/credentials in codebase
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - '--baseline'
          - '.secrets.baseline'
        exclude: |
          (?x)^(
            uv\.lock|
            \.coverage|
            \.env\.example|
            package-lock\.json|
            poetry\.lock|
            yarn\.lock
          )$

  # Optional: Additional pre-commit hooks can be added here
  # Example: Code formatters, linters, etc.

# Azure Governance Platform - Brand Registry
# Source: ~/dev/microsoft-group-management (hub/frontend/src/index.css + tailwind.config.ts)
# HTT brand primary: #500711 (burgundy), Font: Inter
# Logo paths: app/static/assets/brands/{key}/logos/ and icons/

brands:
  httbrands:
    name: "Head to Toe Brands"
    shortName: "HTT Brands"
    domains:
      - httbrands.com
    primaryDomain: httbrands.com
    pages:
      - url: https://httbrands.com
        name: homepage
    logo:
      primary: "/static/assets/brands/httbrands/logos/logo-primary.svg"
      white: "/static/assets/brands/httbrands/logos/logo-white.svg"
      icon: "/static/assets/brands/httbrands/icons/icon.svg"
    colors:
      primary: "#500711"
      secondary: "#BB86FC"
      accent: "#FFC957"
      background: "#FFFFFF"
      text: "#111827"
      gradient: "linear-gradient(135deg, #500711 0%, #FFC957 100%)"
    typography:
      headingFont: "Inter"
      bodyFont: "Inter"
    designSystem:
      borderRadius: "8px"
      shadowStyle: "soft"
    description: "Parent company for franchise beauty brands"

  frenchies:
    name: "Frenchies Modern Nail Care"
    shortName: "Frenchies"
    domains:
      - frenchiesnails.com
      - franchise.frenchiesnails.com
    primaryDomain: frenchiesnails.com
    pages:
      - url: https://frenchiesnails.com
        name: homepage
      - url: https://frenchiesnails.com/locations
        name: locations
      - url: https://franchise.frenchiesnails.com
        name: franchise
    logo:
      primary: "/static/assets/brands/frenchies/logos/logo-primary.svg"
      white: "/static/assets/brands/frenchies/logos/logo-white.svg"
      icon: "/static/assets/brands/frenchies/icons/icon.svg"
    colors:
      primary: "#2563eb"
      secondary: "#500711"
      accent: "#FFC957"
      background: "#FFFFFF"
      text: "#111827"
      gradient: "linear-gradient(135deg, #2563eb 0%, #FFC957 100%)"
    typography:
      headingFont: "Inter"
      bodyFont: "Inter"
    designSystem:
      borderRadius: "8px"
      shadowStyle: "soft"
    description: "Modern nail care franchise"

  bishops:
    name: "Bishops Cuts/Color"
    shortName: "Bishops"

# Azure Governance Platform - Brand Registry
# Adapted from ~/dev/DNS-Domain-Management/config/brands.yaml
# Logo paths point to app/static/assets/brands/{key}/logos/

brands:
  httbrands:
    name: "Head to Toe Brands"
    shortName: "HTT Brands"
    domains:
      - httbrands.com
    primaryDomain: httbrands.com
    pages:
      - url: https://httbrands.com
        name: homepage
    logo:
      primary: "/static/assets/brands/httbrands/logos/logo-primary.svg"
      white: "/static/assets/brands/httbrands/logos/logo-white.svg"
      icon: "/static/assets/brands/httbrands/logos/icon.svg"
    logoUrl: "https://swg.ayu.mybluehost.me/wp-content/uploads/2025/03/Head-To-Toe-logo_horizontal_maroon-scaled-1.webp"
    colors:
      primary: "#000000"
      secondary: "#004a59"
      accent: "#007cba"
      background: "#FFFFFF"
      text: "#000000"
      palette:
        - "#000000"
        - "#004a59"
        - "#005a87"
        - "#006ba1"
        - "#007cba"
      gradient: "linear-gradient(135deg, #000000 0%, #007cba 100%)"
    typography:
      headingFont: "Montserrat"
      bodyFont: "Open Sans"
    designSystem:
      borderRadius: "4px"
      shadowStyle: "sharp"
    description: "Parent company for franchise beauty brands"

  frenchies:
    name: "Frenchies Modern Nail Care"
    shortName: "Frenchies"
    domains:
      - frenchiesnails.com
      - franchise.frenchiesnails.com
    primaryDomain: frenchiesnails.com
    pages:
      - url: https://frenchiesnails.com
        name: homepage
      - url: https://frenchiesnails.com/locations
        name: locations
      - url: https://franchise.frenchiesnails.com
        name: franchise
    logo:
      primary: "/static/assets/brands/frenchies/logos/logo-primary.svg"
      white: "/static/assets/brands/frenchies/logos/logo-white.svg"
      icon: "/static/assets/brands/frenchies/logos/icon.svg"
    logoUrl: "https://frenchiesnails.com/wp-content/themes/frenchies/img/logo.svg"
    colors:
      primary: "#000000"
      secondary: "#004a59"
      accent: "#007cba"
      background: "#FFFFFF"
      text: "#000000"
      palette:
        - "#000000"
        - "#004a59"
        - "#005a87"
        - "#006ba1"
        - "#007cba"
      gradient: "linear-gradient(135deg, #000000 0%, #007cba 100%)"
    typography:
      headingFont: "Mulish"
      bodyFont: "Spectral"
    designSystem:
      borderRadius: "8px"
      shadowStyle: "soft"
    description: "Modern nail care franchise"

  bishops:
    name: "Bishops Cuts/Color"

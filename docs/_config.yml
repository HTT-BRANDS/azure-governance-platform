# Azure Governance Platform - GitHub Pages Configuration

# Site Settings
title: Azure Governance Platform
description: Enterprise-grade Azure governance, cost optimization, and compliance management
baseurl: "/azure-governance-platform"
url: "https://htt-brands.github.io"

# Build Settings
markdown: kramdown
highlighter: rouge
# theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap

# SCSS and Assets
sass:
  sass_dir: assets/css
  style: compressed

# Custom Styles and Scripts
custom_css: /assets/css/custom.css
custom_js: /assets/js/interactive.js

# Navigation Structure
nav:
  - title: Home
    url: /
  - title: Architecture
    url: /architecture/
    children:
      - title: Authentication
        url: /architecture/authentication/
      - title: Data Flow
        url: /architecture/data-flow/
  - title: Operations
    url: /operations/
    children:
      - title: Cost Analysis
        url: /operations/cost-analysis/

# Include Mermaid for diagrams
mermaid:
  src: 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js'

# COMPREHENSIVE EXCLUSIONS - These files/folders cause build errors
exclude:
  # Documentation templates with placeholders
  - "decisions/adr-template.md"
  - "decisions/"

  # Files with Jinja2/Liquid syntax that conflicts
  - "design-system.md"
  - "adr-template.md"

  # Security docs with complex code
  - "security/"
  - "openapi-examples/"

  # Build artifacts
  - "README.md"
  - "CHANGELOG.md"
  - "LICENSE"
  - "Dockerfile"
  - "docker-compose.yml"

  # Config files
  - "package.json"
  - "package-lock.json"
  - "requirements.txt"
  - "pyproject.toml"

  # Scripts and tools
  - "scripts/"
  - "tools/"
  - "tests/"
  - ".github/"

  # Hidden files
  - ".gitignore"
  - ".env"
  - ".env.example"
  - ".flake8"
  - ".pre-commit-config.yaml"

  # Temporary files
  - "*.log"
  - "*.tmp"
  - "*.swp"
  - "*.swo"
  - "*~"

# Collections
collections:
  architecture:
    output: true
    permalink: /:collection/:name/
  operations:
    output: true
    permalink: /:collection/:name/

# Author Info
author:
  name: HTT Brands Engineering
  email: engineering@httbrands.com

# Social Links
social:
  github: HTT-BRANDS

# GitHub Pages Settings
github:
  repository_url: https://github.com/HTT-BRANDS/azure-governance-platform

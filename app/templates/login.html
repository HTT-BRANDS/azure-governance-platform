<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Riverside Capital PE Governance</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

    <!-- Compiled Tailwind CSS (same as rest of app) -->
    <link rel="stylesheet" href="/static/css/theme.css">
</head>
<body class="min-h-screen flex items-center justify-center" style="background-color: #f3f4f6; font-family: 'Inter', sans-serif;">
    <div class="max-w-md w-full mx-4">
        <div class="bg-white rounded-lg shadow-md p-8">
            <!-- Logo / Branding -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full mb-4" style="background-color: #500711;">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold" style="color: #500711;">
                    Riverside Capital
                </h1>
                <p class="text-sm mt-1" style="color: #6b7280;">
                    PE Governance Platform
                </p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-medium" style="color: #374151;">Username</label>
                    <input type="text" id="username" name="username" required autofocus
                           class="mt-1 block w-full rounded-md border px-3 py-2 text-sm focus:outline-none focus:ring-2"
                           style="border-color: #d1d5db; focus: ring-color: #500711;"
                           placeholder="Enter username">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium" style="color: #374151;">Password</label>
                    <input type="password" id="password" name="password" required
                           class="mt-1 block w-full rounded-md border px-3 py-2 text-sm focus:outline-none focus:ring-2"
                           style="border-color: #d1d5db;"
                           placeholder="Enter password">
                </div>

                <div id="error-message" class="text-sm hidden rounded-md px-3 py-2" style="color: #991b1b; background-color: #fef2f2;"></div>

                <button type="submit" id="submit-btn"
                        class="w-full flex justify-center items-center gap-2 py-2.5 px-4 rounded-md text-sm font-semibold text-white transition-colors"
                        style="background-color: #500711;">
                    <span id="btn-text">Sign In</span>
                    <svg id="btn-spinner" class="hidden animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-xs" style="color: #9ca3af;">Access restricted to authorized users</p>
            </div>
        </div>

        <p class="text-center text-xs mt-4" style="color: #9ca3af;">
            Azure Governance Platform v1.2.0
        </p>
    </div>

    <script nonce="{{ request.state.csp_nonce }}">
        const form = document.getElementById('login-form');
        const errorDiv = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.classList.add('hidden');
            btnText.textContent = 'Signing in...';
            btnSpinner.classList.remove('hidden');
            submitBtn.disabled = true;

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const formData = new URLSearchParams();
                formData.append('username', username);
                formData.append('password', password);

                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();

                    // Store token in localStorage (for API calls)
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);

                    // Set cookie for browser page navigation
                    const maxAge = data.expires_in || 1800;
                    document.cookie = `access_token=${data.access_token}; path=/; max-age=${maxAge}; SameSite=Lax`;

                    // Redirect to dashboard
                    window.location.href = '/dashboard';
                } else {
                    const err = await response.json().catch(() => ({}));
                    errorDiv.textContent = err.detail || 'Invalid credentials';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                console.error('Login error:', err);
                errorDiv.textContent = 'Login failed. Please try again.';
                errorDiv.classList.remove('hidden');
            } finally {
                btnText.textContent = 'Sign In';
                btnSpinner.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });

        // Add hover effect via JS since we can't use Tailwind CDN JIT
        submitBtn.addEventListener('mouseenter', () => { submitBtn.style.backgroundColor = '#6B1A24'; });
        submitBtn.addEventListener('mouseleave', () => { submitBtn.style.backgroundColor = '#500711'; });
    </script>
</body>
</html>
